name: Publish Instagram Carousel

on:
  schedule:
    - cron: '0 7 * * *'   # 10:00 МСК
    - cron: '0 11 * * *'  # 14:00 МСК
    - cron: '30 16 * * *' # 19:30 МСК
  workflow_dispatch:       # ручной запуск для тестирования

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Publish carousel via Composio
        env:
          COMPOSIO_API_KEY: ${{ secrets.COMPOSIO_API_KEY }}
        run: |
          python3 << 'EOF'
          import json, os, sys, requests
          from datetime import datetime, timezone, timedelta

          API_KEY = os.environ["COMPOSIO_API_KEY"]

          EXEC_URL_V3 = "https://backend.composio.dev/api/v3/actions/INSTAGRAM_CREATE_CAROUSEL_CONTAINER/execute"
          EXEC_URL_V2 = "https://backend.composio.dev/api/v2/actions/INSTAGRAM_CREATE_CAROUSEL_CONTAINER/execute"
          test_input = {"ig_user_id": "me", "caption": "test", "child_image_urls": ["https://example.com/img.png"]}

          for url, body in [
              (EXEC_URL_V3, {"input": test_input, "connectedAccountId": "instagram_owlet-ruga"}),
              (EXEC_URL_V3, {"input": test_input, "entityId": "default", "appName": "instagram"}),
              (EXEC_URL_V2, {"input": test_input}),
          ]:
              r = requests.post(url, headers={"x-api-key": API_KEY, "content-type": "application/json"},
                                json=body, timeout=15)
              print(f"POST {url}")
              print(f"  body keys: {list(body.keys())} → {r.status_code}: {r.text[:300]}")
          sys.exit(0)
          BASE_URL = "https://backend.composio.dev/api/v2/actions"
          HEADERS = {
              "x-api-key": API_KEY,
              "content-type": "application/json"
          }

          moscow_tz = timezone(timedelta(hours=3))
          now_moscow = datetime.now(moscow_tz)
          today = now_moscow.strftime("%Y-%m-%d")
          hour = now_moscow.hour

          if hour == 10:
              time_slot = "10:00"
          elif hour == 14:
              time_slot = "14:00"
          elif hour == 19:
              time_slot = "19:30"
          else:
              time_slot = None

          print(f"Moscow time: {now_moscow.strftime('%Y-%m-%d %H:%M')}")
          print(f"Today: {today}, time_slot: {time_slot or 'any (manual run)'}")

          with open("schedule.json", "r", encoding="utf-8") as f:
              schedule = json.load(f)

          entry = None
          entry_idx = None
          for i, item in enumerate(schedule):
              if item["date"] != today or item["status"] != "pending":
                  continue
              if time_slot is None or item["time"] == time_slot:
                  entry = item
                  entry_idx = i
                  break

          if entry is None:
              print(f"No pending carousel for {today} slot={time_slot or 'any'}. Skipping.")
              sys.exit(0)

          print(f"Publishing: {entry['id']} — {entry['folder']} at {entry['time']} ({entry['slides_count']} slides)")

          image_urls = [
              f"https://raw.githubusercontent.com/listosha/Insta/main/images/{entry['folder']}/slide-{str(i).zfill(2)}.png"
              for i in range(1, entry["slides_count"] + 1)
          ]
          print(f"URLs: {image_urls}")

          # Шаг 1: создаём carousel container
          resp = requests.post(
              f"{BASE_URL}/INSTAGRAM_CREATE_CAROUSEL_CONTAINER/execute",
              headers=HEADERS,
              json={
                  "input": {
                      "ig_user_id": "me",
                      "caption": entry["caption"],
                      "child_image_urls": image_urls
                  },
                  "connectedAccountId": "instagram_owlet-ruga"
              },
              timeout=60
          )
          print(f"Container status: {resp.status_code}")
          print(f"Container response: {resp.text[:500]}")
          if not resp.ok:
              sys.exit(1)

          creation_id = resp.json()["response"]["data"]["id"]
          print(f"Container created: {creation_id}")

          # Шаг 2: публикуем
          resp2 = requests.post(
              f"{BASE_URL}/INSTAGRAM_POST_IG_USER_MEDIA_PUBLISH/execute",
              headers=HEADERS,
              json={
                  "input": {
                      "ig_user_id": "me",
                      "creation_id": creation_id,
                      "max_wait_seconds": 60
                  },
                  "connectedAccountId": "instagram_owlet-ruga"
              },
              timeout=120
          )
          print(f"Publish status: {resp2.status_code}")
          print(f"Publish response: {resp2.text[:500]}")
          if not resp2.ok:
              sys.exit(1)

          media_id = resp2.json()["response"]["data"]["id"]
          print(f"Published! Media ID: {media_id}")

          schedule[entry_idx]["status"] = "published"
          schedule[entry_idx]["media_id"] = media_id
          schedule[entry_idx]["published_at"] = now_moscow.isoformat()

          with open("schedule.json", "w", encoding="utf-8") as f:
              json.dump(schedule, f, ensure_ascii=False, indent=2)

          print("schedule.json updated.")
          EOF

      - name: Commit updated schedule
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add schedule.json
          git diff --staged --quiet || git commit -m "Published carousel $(date -u +%Y-%m-%d\ %H:%M) UTC"
          git push
