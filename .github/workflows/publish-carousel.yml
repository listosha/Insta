name: Publish Instagram Carousel

on:
  schedule:
    - cron: '0 7 * * *'   # 10:00 МСК
    - cron: '0 11 * * *'  # 14:00 МСК
    - cron: '30 16 * * *' # 19:30 МСК
  workflow_dispatch:       # ручной запуск для тестирования

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Composio SDK
        run: pip install composio-core --quiet

      - name: Publish carousel via Composio
        env:
          COMPOSIO_API_KEY: ${{ secrets.COMPOSIO_API_KEY }}
        run: |
          python3 << 'EOF'
          import requests, os

          api_key = os.getenv("COMPOSIO_API_KEY")
          print(f"API key length: {len(api_key) if api_key else 'NONE'}")
          print(f"API key first 8 chars: {api_key[:8] if api_key else 'NONE'}")
          r = requests.get(
              "https://backend.composio.dev/api/v1/connectedAccounts",
              headers={"x-api-key": api_key})
          print(f"Status: {r.status_code}")
          print(f"Response: {r.text[:300]}")
          exit(0)

          import json
          import os
          import sys
          from datetime import datetime, timezone, timedelta
          from composio import ComposioToolSet, Action

          toolset = ComposioToolSet(api_key=os.environ["COMPOSIO_API_KEY"])

          # Текущее время в Москве (UTC+3)
          moscow_tz = timezone(timedelta(hours=3))
          now_moscow = datetime.now(moscow_tz)
          today = now_moscow.strftime("%Y-%m-%d")
          hour = now_moscow.hour

          # Определяем слот по времени запуска
          if hour == 10:
              time_slot = "10:00"
          elif hour == 14:
              time_slot = "14:00"
          elif hour == 19:
              time_slot = "19:30"
          else:
              time_slot = None  # ручной запуск — берём любой pending

          print(f"Moscow time: {now_moscow.strftime('%Y-%m-%d %H:%M')}")
          print(f"Today: {today}, time_slot: {time_slot or 'any (manual run)'}")

          with open("schedule.json", "r", encoding="utf-8") as f:
              schedule = json.load(f)

          entry = None
          entry_idx = None
          for i, item in enumerate(schedule):
              if item["date"] != today or item["status"] != "pending":
                  continue
              if time_slot is None or item["time"] == time_slot:
                  entry = item
                  entry_idx = i
                  break

          if entry is None:
              print(f"No pending carousel for {today} slot={time_slot or 'any'}. Skipping.")
              sys.exit(0)

          print(f"Publishing: {entry['id']} — {entry['folder']} at {entry['time']} ({entry['slides_count']} slides)")

          image_urls = [
              f"https://raw.githubusercontent.com/listosha/Insta/main/images/{entry['folder']}/slide-{str(i).zfill(2)}.png"
              for i in range(1, entry["slides_count"] + 1)
          ]
          print(f"URLs: {image_urls}")

          # Шаг 1: создаём carousel container
          result = toolset.execute_action(
              action=Action.INSTAGRAM_CREATE_CAROUSEL_CONTAINER,
              params={
                  "ig_user_id": "me",
                  "caption": entry["caption"],
                  "child_image_urls": image_urls,
              },
              entity_id="default",
          )
          print(f"Container result: {result}")
          if not result.get("successful"):
              print(f"ERROR creating container: {result.get('error')}")
              sys.exit(1)

          creation_id = result["data"]["id"]
          print(f"Container created: {creation_id}")

          # Шаг 2: публикуем
          result2 = toolset.execute_action(
              action=Action.INSTAGRAM_POST_IG_USER_MEDIA_PUBLISH,
              params={
                  "ig_user_id": "me",
                  "creation_id": creation_id,
                  "max_wait_seconds": 60,
              },
              entity_id="default",
          )
          print(f"Publish result: {result2}")
          if not result2.get("successful"):
              print(f"ERROR publishing: {result2.get('error')}")
              sys.exit(1)

          media_id = result2["data"]["id"]
          print(f"Published! Media ID: {media_id}")

          # Шаг 3: обновляем schedule.json
          schedule[entry_idx]["status"] = "published"
          schedule[entry_idx]["media_id"] = media_id
          schedule[entry_idx]["published_at"] = now_moscow.isoformat()

          with open("schedule.json", "w", encoding="utf-8") as f:
              json.dump(schedule, f, ensure_ascii=False, indent=2)

          print("schedule.json updated.")
          EOF

      - name: Commit updated schedule
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add schedule.json
          git diff --staged --quiet || git commit -m "Published carousel $(date -u +%Y-%m-%d\ %H:%M) UTC"
          git push
