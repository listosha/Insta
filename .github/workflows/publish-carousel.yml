name: Publish Instagram Carousel

on:
  schedule:
    - cron: '0 7 * * *'   # 10:00 МСК
    - cron: '0 11 * * *'  # 14:00 МСК
    - cron: '30 16 * * *' # 19:30 МСК
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Publish carousel via Instagram Graph API
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
        run: |
          python3 << 'EOF'
          import json
          import os
          import sys
          import time
          import requests
          from datetime import datetime, timezone, timedelta

          ACCESS_TOKEN = os.environ["INSTAGRAM_ACCESS_TOKEN"]
          GRAPH_BASE   = "https://graph.facebook.com/v21.0"

          # Получаем правильный IG Business Account ID через Facebook Pages
          r = requests.get(f"{GRAPH_BASE}/me/accounts", params={"access_token": ACCESS_TOKEN})
          print(f"Pages: {r.status_code} {r.text[:500]}")
          pages = r.json().get("data", [])
          IG_USER_ID = None
          for page in pages:
              page_id = page["id"]
              r2 = requests.get(f"{GRAPH_BASE}/{page_id}",
                                params={"fields": "instagram_business_account", "access_token": ACCESS_TOKEN})
              print(f"Page {page_id}: {r2.text[:300]}")
              ig = r2.json().get("instagram_business_account", {})
              if ig.get("id"):
                  IG_USER_ID = ig["id"]
                  print(f"Found IG account: {IG_USER_ID}")
                  break
          if not IG_USER_ID:
              print("ERROR: No Instagram Business account found linked to any Facebook Page")
              sys.exit(1)

          moscow_tz = timezone(timedelta(hours=3))
          now_moscow = datetime.now(moscow_tz)
          today = now_moscow.strftime("%Y-%m-%d")
          hour  = now_moscow.hour

          if hour == 10:
              time_slot = "10:00"
          elif hour == 14:
              time_slot = "14:00"
          elif hour == 19:
              time_slot = "19:30"
          else:
              time_slot = None

          print(f"Moscow time: {now_moscow.strftime('%Y-%m-%d %H:%M')}, slot: {time_slot or 'any'}")

          with open("schedule.json", "r", encoding="utf-8") as f:
              schedule = json.load(f)

          entry = None
          entry_idx = None
          for i, item in enumerate(schedule):
              if item["date"] != today or item["status"] != "pending":
                  continue
              if time_slot is None or item["time"] == time_slot:
                  entry = item
                  entry_idx = i
                  break

          if entry is None:
              print(f"No pending carousel for {today} slot={time_slot or 'any'}. Skipping.")
              sys.exit(0)

          print(f"Publishing: {entry['id']} — {entry['folder']} ({entry['slides_count']} slides)")

          image_urls = [
              f"https://raw.githubusercontent.com/listosha/Insta/main/images/{entry['folder']}/slide-{str(i).zfill(2)}.png"
              for i in range(1, entry["slides_count"] + 1)
          ]
          print(f"URLs: {image_urls}")

          # Шаг 1: создаём item-контейнеры для каждого слайда
          item_ids = []
          for idx, url in enumerate(image_urls, 1):
              resp = requests.post(
                  f"{GRAPH_BASE}/{IG_USER_ID}/media",
                  params={
                      "image_url":        url,
                      "is_carousel_item": "true",
                      "access_token":     ACCESS_TOKEN,
                  },
                  timeout=60,
              )
              print(f"  Slide {idx}: {resp.status_code} {resp.text[:200]}")
              if not resp.ok:
                  sys.exit(1)
              item_ids.append(resp.json()["id"])

          print(f"Item IDs: {item_ids}")

          # Шаг 2: создаём carousel container
          resp = requests.post(
              f"{GRAPH_BASE}/{IG_USER_ID}/media",
              params={
                  "media_type":   "CAROUSEL",
                  "caption":      entry["caption"],
                  "children":     ",".join(item_ids),
                  "access_token": ACCESS_TOKEN,
              },
              timeout=60,
          )
          print(f"Carousel container: {resp.status_code} {resp.text[:200]}")
          if not resp.ok:
              sys.exit(1)
          creation_id = resp.json()["id"]
          print(f"Container ID: {creation_id}")

          # Шаг 3: ждём готовности контейнера
          for attempt in range(10):
              time.sleep(3)
              r = requests.get(
                  f"{GRAPH_BASE}/{creation_id}",
                  params={"fields": "status_code", "access_token": ACCESS_TOKEN},
                  timeout=30,
              )
              status = r.json().get("status_code", "")
              print(f"  Container status: {status}")
              if status == "FINISHED":
                  break
              if status == "ERROR":
                  print(f"Container error: {r.text}")
                  sys.exit(1)

          # Шаг 4: публикуем
          resp = requests.post(
              f"{GRAPH_BASE}/{IG_USER_ID}/media_publish",
              params={
                  "creation_id":  creation_id,
                  "access_token": ACCESS_TOKEN,
              },
              timeout=60,
          )
          print(f"Publish: {resp.status_code} {resp.text[:200]}")
          if not resp.ok:
              sys.exit(1)

          media_id = resp.json()["id"]
          print(f"Published! Media ID: {media_id}")

          schedule[entry_idx]["status"]       = "published"
          schedule[entry_idx]["media_id"]     = media_id
          schedule[entry_idx]["published_at"] = now_moscow.isoformat()

          with open("schedule.json", "w", encoding="utf-8") as f:
              json.dump(schedule, f, ensure_ascii=False, indent=2)

          print("schedule.json updated.")
          EOF

      - name: Commit updated schedule
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add schedule.json
          git diff --staged --quiet || git commit -m "Published carousel $(date -u +%Y-%m-%d\ %H:%M) UTC"
          git push
