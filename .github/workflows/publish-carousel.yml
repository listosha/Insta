name: Publish Instagram Carousel

on:
  schedule:
    - cron: '0 7 * * *'   # 10:00 МСК
    - cron: '0 11 * * *'  # 14:00 МСК
    - cron: '30 16 * * *' # 19:30 МСК
  workflow_dispatch:       # ручной запуск для тестирования

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Publish carousel via Composio
        env:
          COMPOSIO_API_KEY: ${{ secrets.COMPOSIO_API_KEY }}
        run: |
          python3 << 'EOF'
          import json
          import os
          import sys
          import requests
          from datetime import datetime, timezone, timedelta

          API_KEY = os.environ["COMPOSIO_API_KEY"]
          BASE_URL = "https://backend.composio.dev/api/v2/actions"
          HEADERS = {
              "x-api-key": API_KEY,
              "content-type": "application/json"
          }

          # Текущее время в Москве (UTC+3)
          moscow_tz = timezone(timedelta(hours=3))
          now_moscow = datetime.now(moscow_tz)
          today = now_moscow.strftime("%Y-%m-%d")
          hour = now_moscow.hour
          minute = now_moscow.minute

          # Определяем слот по времени запуска
          # 07:00 UTC → 10:00 МСК → ищем "10:00"
          # 11:00 UTC → 14:00 МСК → ищем "14:00"
          # 16:30 UTC → 19:30 МСК → ищем "19:30"
          if hour == 10:
              time_slot = "10:00"
          elif hour == 14:
              time_slot = "14:00"
          elif hour == 19:
              time_slot = "19:30"
          else:
              # Для ручного запуска — ищем любой pending на сегодня
              time_slot = None

          print(f"Moscow time: {now_moscow.strftime('%Y-%m-%d %H:%M')}")
          print(f"Today: {today}, time_slot: {time_slot or 'any (manual run)'}")

          with open("schedule.json", "r", encoding="utf-8") as f:
              schedule = json.load(f)

          entry = None
          entry_idx = None
          for i, item in enumerate(schedule):
              if item["date"] != today or item["status"] != "pending":
                  continue
              if time_slot is None or item["time"] == time_slot:
                  entry = item
                  entry_idx = i
                  break

          if entry is None:
              print(f"No pending carousel for {today} slot={time_slot or 'any'}. Skipping.")
              sys.exit(0)

          print(f"Publishing carousel {entry['id']} — {entry['folder']} at {entry['time']} ({entry['slides_count']} slides)")

          # Формируем URL картинок
          image_urls = [
              f"https://raw.githubusercontent.com/listosha/Insta/main/images/{entry['folder']}/slide-{str(i).zfill(2)}.png"
              for i in range(1, entry["slides_count"] + 1)
          ]
          print(f"URLs: {image_urls}")

          # Шаг 1: создаём carousel container
          resp = requests.post(
              f"{BASE_URL}/INSTAGRAM_CREATE_CAROUSEL_CONTAINER/execute",
              headers=HEADERS,
              json={
                  "input": {
                      "ig_user_id": "me",
                      "caption": entry["caption"],
                      "child_image_urls": image_urls
                  },
                  "connectedAccountId": "instagram_frough-look",
                  "appName": "instagram"
              },
              timeout=60
          )
          if not resp.ok:
              print(f"ERROR creating container: {resp.status_code} {resp.text}")
              sys.exit(1)

          creation_id = resp.json()["response"]["data"]["id"]
          print(f"Container created: {creation_id}")

          # Шаг 2: публикуем
          resp = requests.post(
              f"{BASE_URL}/INSTAGRAM_POST_IG_USER_MEDIA_PUBLISH/execute",
              headers=HEADERS,
              json={
                  "input": {
                      "ig_user_id": "me",
                      "creation_id": creation_id,
                      "max_wait_seconds": 60
                  },
                  "connectedAccountId": "instagram_frough-look",
                  "appName": "instagram"
              },
              timeout=120
          )
          if not resp.ok:
              print(f"ERROR publishing: {resp.status_code} {resp.text}")
              sys.exit(1)

          media_id = resp.json()["response"]["data"]["id"]
          print(f"Published! Media ID: {media_id}")

          # Шаг 3: обновляем schedule.json
          schedule[entry_idx]["status"] = "published"
          schedule[entry_idx]["media_id"] = media_id
          schedule[entry_idx]["published_at"] = now_moscow.isoformat()

          with open("schedule.json", "w", encoding="utf-8") as f:
              json.dump(schedule, f, ensure_ascii=False, indent=2)

          print("schedule.json updated.")
          EOF

      - name: Commit updated schedule
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add schedule.json
          git diff --staged --quiet || git commit -m "Published carousel $(date -u +%Y-%m-%d\ %H:%M) UTC"
          git push
