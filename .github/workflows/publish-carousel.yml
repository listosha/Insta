name: Publish Instagram Carousel

on:
  schedule:
    - cron: '30 16 * * *'  # 19:30 Moscow (UTC+3)
  workflow_dispatch:        # manual trigger for testing

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Publish carousel via Composio
        env:
          COMPOSIO_API_KEY: ${{ secrets.COMPOSIO_API_KEY }}
        run: |
          python3 << 'EOF'
          import json
          import os
          import sys
          import time
          import requests
          from datetime import datetime, timezone, timedelta

          API_KEY = os.environ["COMPOSIO_API_KEY"]
          BASE_URL = "https://backend.composio.dev/api/v2/actions"
          HEADERS = {
              "x-api-key": API_KEY,
              "content-type": "application/json"
          }

          # Today's date in Moscow time (UTC+3)
          moscow_tz = timezone(timedelta(hours=3))
          today = datetime.now(moscow_tz).strftime("%Y-%m-%d")
          print(f"Today (Moscow): {today}")

          with open("schedule.json", "r", encoding="utf-8") as f:
              schedule = json.load(f)

          entry = None
          entry_idx = None
          for i, item in enumerate(schedule):
              if item["date"] == today and item["status"] == "pending":
                  entry = item
                  entry_idx = i
                  break

          if entry is None:
              print(f"No pending carousel for {today}. Skipping.")
              sys.exit(0)

          print(f"Found carousel {entry['id']} — {entry['folder']} ({entry['slides_count']} slides)")

          # Build image URLs
          image_urls = [
              f"https://raw.githubusercontent.com/listosha/Insta/main/images/{entry['folder']}/slide-{str(i).zfill(2)}.png"
              for i in range(1, entry["slides_count"] + 1)
          ]
          print(f"Image URLs: {image_urls}")

          # Step 1: Create carousel container
          payload = {
              "input": {
                  "ig_user_id": "me",
                  "caption": entry["caption"],
                  "child_image_urls": image_urls
              },
              "entity_id": "default"
          }

          print("Creating carousel container...")
          resp = requests.post(
              f"{BASE_URL}/INSTAGRAM_CREATE_CAROUSEL_CONTAINER/execute",
              headers=HEADERS,
              json=payload,
              timeout=60
          )

          if not resp.ok:
              print(f"ERROR creating container: {resp.status_code} {resp.text}")
              sys.exit(1)

          result = resp.json()
          creation_id = result["response"]["data"]["id"]
          print(f"Carousel container created: {creation_id}")

          # Step 2: Publish
          payload = {
              "input": {
                  "ig_user_id": "me",
                  "creation_id": creation_id,
                  "max_wait_seconds": 60
              },
              "entity_id": "default"
          }

          print("Publishing carousel...")
          resp = requests.post(
              f"{BASE_URL}/INSTAGRAM_POST_IG_USER_MEDIA_PUBLISH/execute",
              headers=HEADERS,
              json=payload,
              timeout=120
          )

          if not resp.ok:
              print(f"ERROR publishing: {resp.status_code} {resp.text}")
              sys.exit(1)

          result = resp.json()
          media_id = result["response"]["data"]["id"]
          print(f"Published! Instagram media ID: {media_id}")

          # Step 3: Update schedule.json
          schedule[entry_idx]["status"] = "published"
          schedule[entry_idx]["media_id"] = media_id
          schedule[entry_idx]["published_at"] = datetime.now(moscow_tz).isoformat()

          with open("schedule.json", "w", encoding="utf-8") as f:
              json.dump(schedule, f, ensure_ascii=False, indent=2)

          print("schedule.json updated.")
          EOF

      - name: Commit updated schedule
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add schedule.json
          git diff --staged --quiet || git commit -m "Published carousel $(date -u +%Y-%m-%d)"
          git push
